<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>保险说明</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 弹窗遮罩层 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            z-index: 1000;
        }

        /* 满屏弹窗 */
        .modal-container {
            width: 100%;
            height: 100%; /* 满屏 */
            background-color: #fff;
            display: flex;
            flex-direction: column;
        }

        /* 标题栏 */
        .modal-header {
            background-color: #4b88ff; /* 蓝色标题栏 */
            color: #fff;
            text-align: center;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
        }

        /* 横幅图片 */
        .banner-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 副标题/折叠面板头 */
        .modal-sub-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
            font-size: 16px;
            color: #333;
            font-weight: 500;
        }
        
        .modal-sub-header::after {
            content: "";
            display: inline-block;
            width: 10px;
            height: 10px;
            border-top: 2px solid #4b88ff;
            border-right: 2px solid #4b88ff;
            transform: rotate(-45deg);
        }

        /* 内容区 */
        .modal-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 15px;
            font-size: 14px;
            color: #666;
            line-height: 1.8;
            -webkit-overflow-scrolling: touch;
        }

        .modal-content p {
            margin-bottom: 10px;
        }

        /* 底部按钮区 */
        .modal-footer {
            display: flex;
            background-color: #fff;
            padding-bottom: env(safe-area-inset-bottom); /* 适配全面屏底部安全区 */
        }

        .cancel-btn {
            flex: 1;
            background-color: #fff;
            color: #666;
            text-align: center;
            padding: 18px 0;
            font-size: 16px;
            border: none;
            border-top: 1px solid #eee;
            outline: none;
            cursor: pointer;
        }

        .cancel-btn:active {
            background-color: #f5f5f5;
        }

        .accept-btn {
            flex: 1;
            background-color: #4b88ff;
            color: #fff;
            text-align: center;
            padding: 18px 0;
            font-size: 16px;
            border: none;
            outline: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .accept-btn:disabled {
            background-color: #92b8ff; /* 禁用状态的浅蓝色 */
            cursor: not-allowed;
        }
        
        .accept-btn.active {
            background-color: #2e6ff2; /* 激活后的蓝色 */
        }
        
        .accept-btn.active:active {
            background-color: #1c5ce0; /* 点击时的深蓝色 */
        }
    </style>
</head>
<body>

    <!-- 满屏弹窗 -->
    <div class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">保险说明</div>
            
            <img src="./img.jpg" alt="中国人民保险" class="banner-img">
            
            <div class="modal-sub-header">
                投保须知及声明
            </div>
            
            <div class="modal-content">
                <p>一、产品类型：本产品为消费型保险产品，非储蓄型或返还型保险产品。</p>
                <p>二、承保公司：本保险产品由中国人民财产保险股份有限公司（以下简称“人保财险”）承保，且未与任何其他保险公司构成共同保险关系。</p>
            </div>
            
            <div class="modal-footer">
                <button id="cancelBtn" class="cancel-btn">取消</button>
                <button id="acceptBtn" class="accept-btn" disabled>同意并继续 (5s)</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            let countdown = 5;
            const btn = document.getElementById('acceptBtn');
            const targetUrl = 'https://epicc.cn/t/wy/1WNBt7H';
            
            // 初始化按钮状态
            btn.innerText = `同意并继续 (${countdown}s)`;
            
            // 倒计时逻辑
            const timer = setInterval(() => {
                countdown--;
                if (countdown > 0) {
                    btn.innerText = `同意并继续 (${countdown}s)`;
                } else {
                    clearInterval(timer);
                    btn.innerText = '同意并继续';
                    btn.disabled = false;
                    btn.classList.add('active');
                }
            }, 1000);
            
            // 点击跳转
            btn.addEventListener('click', function() {
                if (!btn.disabled) {
                    window.location.href = targetUrl;
                }
            });
        });
    </script>
</body>
</html>
